services:
  batespoker:
    build: .
    container_name: batespoker
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/app/.poker-data/poker.db
    volumes:
      - ./data:/app/.poker-data
